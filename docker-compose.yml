services:
  zfrontier:
    build:
      context: .
    image: zf:local
    container_name: zf
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HEADLESS: "1"
      USE_CHROME: "0"
      REPORT_HOST: "0.0.0.0"
      REPORT_PORT: "8787"
      CRAWL_INTERVAL_SECONDS: "3600"
      RUN_ON_START: "1"
      ZF_DAYS: "7"
      ZF_SIGN_IN_TZ: Asia/Shanghai
      TZ: Asia/Shanghai
      ZF_PROFILE_DIR: /data/browser-profile
      ZF_ENGAGED_DB: /data/engaged-lotteries.sqlite
      ZF_ENGAGED_HTML: /data/engaged-lotteries.html
      CRAWLEE_STORAGE_DIR: /data/crawlee-storage
    ports:
      - "8787:8787"
    volumes:
      - ./data:/data
