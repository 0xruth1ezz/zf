name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  IMAGE_NAME: cangzhang/zfrontier-lottery

jobs:
  build-and-push:
    name: Build and push multi-arch Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare git SHA tag
        id: meta
        shell: bash
        run: |
          short_sha="$(git rev-parse --short HEAD)"
          image_tag="${IMAGE_NAME}:${short_sha}"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.image_tag }}

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "## Docker Image Published"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Image | \`${{ steps.meta.outputs.image_tag }}\` |"
            echo "| Platforms | \`linux/amd64, linux/arm64\` |"
            echo "| Digest | \`${{ steps.build.outputs.digest }}\` |"
            echo "| Git short SHA | \`${{ steps.meta.outputs.short_sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
