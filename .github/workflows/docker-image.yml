name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  IMAGE_NAME: cangzhang/zf
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-rust-binaries:
    name: Build Rust binary (${{ matrix.docker_arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - docker_arch: amd64
            runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
          - docker_arch: arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config
          sudo apt-get install -y --no-install-recommends mold

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: zfrontier-report-server-${{ matrix.rust_target }}
          cache-targets: true

      - name: Build report server
        shell: bash
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: |
          cargo build --release --locked --target "${{ matrix.rust_target }}"
          mkdir -p "target/docker/${{ matrix.docker_arch }}"
          cp "target/${{ matrix.rust_target }}/release/zfrontier-report-server" \
            "target/docker/${{ matrix.docker_arch }}/zfrontier-report-server"

      - name: Upload report server binary
        uses: actions/upload-artifact@v7
        with:
          name: zfrontier-report-server-${{ matrix.docker_arch }}
          path: target/docker/${{ matrix.docker_arch }}/zfrontier-report-server
          if-no-files-found: error
          retention-days: 1

  build-and-push:
    name: Build and push multi-arch Docker image
    runs-on: ubuntu-24.04
    needs: build-rust-binaries
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare git SHA tag
        id: meta
        shell: bash
        run: |
          short_sha="$(git rev-parse --short HEAD)"
          image_tag="${IMAGE_NAME}:${short_sha}"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Download amd64 report server binary
        uses: actions/download-artifact@v8
        with:
          name: zfrontier-report-server-amd64
          path: target/docker/amd64

      - name: Download arm64 report server binary
        uses: actions/download-artifact@v8
        with:
          name: zfrontier-report-server-arm64
          path: target/docker/arm64

      - name: Prepare report server binaries
        shell: bash
        run: chmod +x target/docker/*/zfrontier-report-server

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Ensure Docker Hub repository exists
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          namespace="${IMAGE_NAME%%/*}"
          repository="${IMAGE_NAME#*/}"

          login_payload="$(
            python3 -c 'import json, os; print(json.dumps({"username": os.environ["DOCKERHUB_USERNAME"], "password": os.environ["DOCKERHUB_TOKEN"]}))'
          )"
          hub_token="$(
            curl -fsS \
              -H "Content-Type: application/json" \
              -X POST \
              -d "${login_payload}" \
              https://hub.docker.com/v2/users/login/ \
            | python3 -c 'import json, sys; print(json.load(sys.stdin)["token"])'
          )"

          status="$(
            curl -sS \
              -o /tmp/dockerhub-repository.json \
              -w "%{http_code}" \
              -H "Authorization: Bearer ${hub_token}" \
              "https://hub.docker.com/v2/namespaces/${namespace}/repositories/${repository}"
          )"

          if [ "${status}" = "200" ]; then
            echo "Docker Hub repository ${namespace}/${repository} already exists."
            exit 0
          fi

          if [ "${status}" != "404" ]; then
            cat /tmp/dockerhub-repository.json
            exit 1
          fi

          export namespace repository
          create_payload="$(
            python3 -c 'import json, os; print(json.dumps({"namespace": os.environ["namespace"], "name": os.environ["repository"], "description": "zFrontier lottery crawler", "full_description": "zFrontier lottery crawler and report server.", "registry": "docker.io", "is_private": False}))'
          )"
          create_status="$(
            curl -sS \
              -o /tmp/dockerhub-create-repository.json \
              -w "%{http_code}" \
              -H "Authorization: Bearer ${hub_token}" \
              -H "Content-Type: application/json" \
              -X POST \
              -d "${create_payload}" \
              "https://hub.docker.com/v2/namespaces/${namespace}/repositories"
          )"

          if [ "${create_status}" != "201" ]; then
            cat /tmp/dockerhub-create-repository.json
            exit 1
          fi

          echo "Created Docker Hub repository ${namespace}/${repository}."

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.ci
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "## Docker Image Published"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Image | \`${{ steps.meta.outputs.image_tag }}\` |"
            echo "| Platforms | \`linux/amd64, linux/arm64\` |"
            echo "| Digest | \`${{ steps.build.outputs.digest }}\` |"
            echo "| Git short SHA | \`${{ steps.meta.outputs.short_sha }}\` |"
            echo "| Rust binaries | Prebuilt with Actions cache before Docker build |"
          } >> "$GITHUB_STEP_SUMMARY"
